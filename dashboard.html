<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工程日報統計儀表板</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
</head>
<body class="dashboard">
  <header>
    <div class="header-left">
      <h1>📊 工程日報統計儀表板</h1>
      <p class="subtitle" id="subtitle">載入資料中…</p>
    </div>
    <nav class="header-nav">
      <a href="index.html" class="nav-btn icon-only" title="日報輸入">
        <span class="nav-emoji">📝</span>
      </a>
      <a href="reports.html" class="nav-btn icon-only" title="日報列表">
        <span class="nav-emoji">📋</span>
      </a>
      <button id="open-settings" class="nav-btn icon-only" title="GitHub 連線設定">
        <span class="nav-emoji">⚙️</span>
      </button>
    </nav>
  </header>

  <main>
    <section class="panel">
      <h2>篩選條件</h2>
      <div class="row">
        <label>起日 <input type="date" id="f-start" /></label>
        <label>迄日 <input type="date" id="f-end" /></label>
        <label>區域
          <select id="f-area"><option value="">全部</option></select>
        </label>
        <label>回報者
          <select id="f-reporter"><option value="">全部</option></select>
        </label>
        <button id="f-reset">清除篩選</button>
      </div>
    </section>

    <section class="kpi-grid" id="kpi-grid"></section>

    <section class="panel">
      <h2>主要工種累計人日（前 15）</h2>
      <div class="chart-wrap"><canvas id="chart-labor"></canvas></div>
    </section>

    <section class="panel">
      <h2>主要工種每月出工趨勢</h2>
      <div class="chart-wrap tall"><canvas id="chart-trend"></canvas></div>
    </section>

    <section class="panel">
      <h2>各區域每月人日（堆疊）</h2>
      <div class="chart-wrap tall"><canvas id="chart-area"></canvas></div>
    </section>

    <div class="two-col">
      <section class="panel">
        <h2>天氣分布</h2>
        <div class="chart-wrap"><canvas id="chart-weather"></canvas></div>
      </section>
      <section class="panel">
        <h2>回報者分布</h2>
        <div class="chart-wrap"><canvas id="chart-reporter"></canvas></div>
      </section>
    </div>

    <section class="panel">
      <h2>機具出勤天數</h2>
      <div class="chart-wrap"><canvas id="chart-equipment"></canvas></div>
    </section>

    <section class="panel">
      <h2>混凝土澆置量（m³） by 月份</h2>
      <div class="chart-wrap"><canvas id="chart-concrete"></canvas></div>
    </section>

  </main>

  <script src="github-sync.js"></script>
  <script src="settings-modal.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
